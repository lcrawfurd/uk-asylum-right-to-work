<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The £10,000 charge vs. the right to work</title>
<style>
  :root {
    --surface: #fcfcfb;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --charge: #e34948;
    --rtw-b: #2a78d6;
    --rtw-c: #1baf7a;
    --whisker: #0b0b0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --charge: #e66767;
      --rtw-b: #3987e5;
      --rtw-c: #199e70;
      --whisker: #ffffff;
    }
  }
  :root[data-theme="dark"] {
    --surface: #1a1a19; --text-primary: #ffffff; --text-secondary: #c3c2b7;
    --muted: #898781; --grid: #2c2c2a; --baseline: #383835;
    --charge: #e66767; --rtw-b: #3987e5; --rtw-c: #199e70; --whisker: #ffffff;
  }
  :root[data-theme="light"] {
    --surface: #fcfcfb; --text-primary: #0b0b0b; --text-secondary: #52514e;
    --muted: #898781; --grid: #e1e0d9; --baseline: #c3c2b7;
    --charge: #e34948; --rtw-b: #2a78d6; --rtw-c: #1baf7a; --whisker: #0b0b0b;
  }
  html, body { margin: 0; padding: 0; background: var(--surface); }
  .wrap {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--text-primary);
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px 32px;
    position: relative;
  }
  h1 { font-size: 20px; line-height: 1.25; margin: 0 0 6px; font-weight: 650; }
  .sub { font-size: 13.5px; color: var(--text-secondary); margin: 0 0 8px; line-height: 1.4; }
  svg { width: 100%; height: auto; display: block; overflow: visible; }
  .desc { fill: var(--text-primary); font-size: 13.5px; font-weight: 550; }
  .val { fill: var(--text-primary); font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .range { fill: var(--muted); font-size: 11.5px; font-variant-numeric: tabular-nums; }
  .tick { fill: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
  .axtitle { fill: var(--text-secondary); font-size: 12px; }
  .foot { fill: var(--muted); font-size: 10.5px; }
  .bar { transition: opacity .12s; cursor: default; }
  .row:hover .bar { opacity: .82; }
  .tip {
    position: absolute; pointer-events: none; opacity: 0;
    transform: translate(-50%, -100%);
    background: var(--text-primary); color: var(--surface);
    font-size: 12px; line-height: 1.35; padding: 7px 9px; border-radius: 6px;
    max-width: 250px; box-shadow: 0 2px 10px rgba(0,0,0,.25); transition: opacity .1s; z-index: 5;
  }
  .tip b { font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <h1>The charge collects little. The right to work is worth several times more.</h1>
  <p class="sub">Fiscal value to the Exchequer per annual cohort of ~80,000 adult asylum seekers, over ten years. Bars show the central estimate; whiskers show the plausible range.</p>
  <div class="tip" id="tip"></div>
  <svg viewBox="0 0 820 398" role="img" aria-label="Bar chart comparing the fiscal value of the £10,000 charge (about £54m) against two right-to-work channels: support saved while claims are pending (about £175m) and employment scarring avoided (about £115m), per cohort over ten years.">
    <!-- gridlines -->
    <g stroke-width="1">
      <line x1="282" y1="78" x2="282" y2="290" stroke="var(--grid)"/>
      <line x1="390" y1="78" x2="390" y2="290" stroke="var(--grid)"/>
      <line x1="497" y1="78" x2="497" y2="290" stroke="var(--grid)"/>
      <line x1="604" y1="78" x2="604" y2="290" stroke="var(--grid)"/>
      <line x1="175" y1="78" x2="175" y2="290" stroke="var(--baseline)" stroke-width="1.5"/>
    </g>

    <!-- Row 1: charge -->
    <g class="row" data-title="The £10,000 charge" data-body="Recovers only ~£24m per cohort over 10 years — about 3% of what it notionally bills. Only the ~60% granted asylum and staying ever repay, and refugee earnings are measured only among the minority in work; most earn below the repayment threshold." data-cx="226" data-cy="120">
      <text class="desc" x="175" y="92">What the £10,000 charge actually recovers</text>
      <path class="bar" d="M175,100 H222.5 A4,4 0 0 1 226.5,104 V136 A4,4 0 0 1 222.5,140 H175 Z" fill="var(--charge)"/>
      <line x1="213.6" y1="120" x2="243.6" y2="120" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <line x1="213.6" y1="114" x2="213.6" y2="126" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <line x1="243.6" y1="114" x2="243.6" y2="126" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <text class="val" x="256" y="116">£24m</text>
      <text class="range" x="256" y="131">£18–32m</text>
    </g>

    <!-- Row 2: right to work — support saved -->
    <g class="row" data-title="Right to work — support saved" data-body="Letting people work while their claim is pending offsets ~£175m of accommodation and subsistence per cohort. This channel pays off whether or not the claim later succeeds — the only one immune to the grant rate." data-cx="550" data-cy="205">
      <text class="desc" x="175" y="177">Right to work — support saved while claims pending</text>
      <path class="bar" d="M175,185 H546.5 A4,4 0 0 1 550.5,189 V221 A4,4 0 0 1 546.5,225 H175 Z" fill="var(--rtw-b)"/>
      <line x1="454" y1="205" x2="647.1" y2="205" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <line x1="454" y1="199" x2="454" y2="211" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <line x1="647.1" y1="199" x2="647.1" y2="211" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <text class="val" x="659" y="201">£175m</text>
      <text class="range" x="659" y="216">£130–220m</text>
    </g>

    <!-- Row 3: right to work — scarring avoided -->
    <g class="row" data-title="Right to work — scarring avoided" data-body="A 12→6 month cut lifts refugee employment by ~3 percentage points for up to a decade, worth ~£115m per cohort. Two independent studies (Fasani et al.; Hainmueller et al.) bracket the effect at 2–5 points." data-cx="422" data-cy="262">
      <text class="desc" x="175" y="234">Right to work — employment scarring avoided</text>
      <path class="bar" d="M175,242 H417.8 A4,4 0 0 1 421.8,246 V278 A4,4 0 0 1 417.8,282 H175 Z" fill="var(--rtw-c)"/>
      <line x1="299.5" y1="262" x2="660.1" y2="262" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <line x1="299.5" y1="256" x2="299.5" y2="268" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <line x1="660.1" y1="256" x2="660.1" y2="268" stroke="var(--whisker)" stroke-width="1.5" opacity="0.7"/>
      <text class="val" x="672" y="258">£115m</text>
      <text class="range" x="672" y="273">£58–226m</text>
    </g>

    <!-- x axis -->
    <g>
      <text class="tick" x="175" y="305" text-anchor="middle">0</text>
      <text class="tick" x="282" y="305" text-anchor="middle">50</text>
      <text class="tick" x="390" y="305" text-anchor="middle">100</text>
      <text class="tick" x="497" y="305" text-anchor="middle">150</text>
      <text class="tick" x="604" y="305" text-anchor="middle">200</text>
      <text class="axtitle" x="175" y="330">£ millions per annual cohort, over ten years</text>
    </g>

    <!-- footnotes -->
    <text class="foot" x="175" y="362">Charge recovery and scarring scale with the ~60% eventual grant rate; support saved does not. Independently math-checked.</text>
    <text class="foot" x="175" y="378">Sources: Home Office RIO; IPPR; NAO; Fasani et al. (2020); Hainmueller et al. (2016). Full workings in the BOTEC.</text>
  </svg>
</div>

<script>
  (function () {
    var tip = document.getElementById('tip');
    var wrap = document.querySelector('.wrap');
    var svg = document.querySelector('svg');
    document.querySelectorAll('.row').forEach(function (row) {
      row.addEventListener('mousemove', function (e) {
        var r = wrap.getBoundingClientRect();
        tip.innerHTML = '<b>' + row.dataset.title + '</b><br>' + row.dataset.body;
        tip.style.left = (e.clientX - r.left) + 'px';
        tip.style.top = (e.clientY - r.top - 8) + 'px';
        tip.style.opacity = 1;
      });
      row.addEventListener('mouseleave', function () { tip.style.opacity = 0; });
    });
  })();
</script>
</body>
</html>
