<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>An asylum seeker's 20 years: earnings, tax, and the £10k charge</title>
<style>
  :root{--surface:#fcfcfb;--text-primary:#0b0b0b;--text-secondary:#52514e;--muted:#898781;
    --grid:#e1e0d9;--baseline:#c3c2b7;--earn:#2a78d6;--tax:#1baf7a;--charge:#e34948;--track:#e1e0d9;}
  @media (prefers-color-scheme:dark){:root{--surface:#1a1a19;--text-primary:#fff;--text-secondary:#c3c2b7;--muted:#898781;
    --grid:#2c2c2a;--baseline:#383835;--earn:#3987e5;--tax:#199e70;--charge:#e66767;--track:#2c2c2a;}}
  :root[data-theme="dark"]{--surface:#1a1a19;--text-primary:#fff;--text-secondary:#c3c2b7;--muted:#898781;--grid:#2c2c2a;--baseline:#383835;--earn:#3987e5;--tax:#199e70;--charge:#e66767;--track:#2c2c2a;}
  :root[data-theme="light"]{--surface:#fcfcfb;--text-primary:#0b0b0b;--text-secondary:#52514e;--muted:#898781;--grid:#e1e0d9;--baseline:#c3c2b7;--earn:#2a78d6;--tax:#1baf7a;--charge:#e34948;--track:#e1e0d9;}
  html,body{margin:0;padding:0;background:var(--surface);}
  .wrap{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text-primary);max-width:1000px;margin:0 auto;padding:24px 18px 28px;}
  h1{font-size:20px;line-height:1.25;margin:0 0 6px;font-weight:650;}
  .sub{font-size:13.5px;color:var(--text-secondary);margin:0 0 6px;line-height:1.4;}
  .scroll{overflow-x:auto;}
  svg{display:block;min-width:720px;width:100%;height:auto;font-family:inherit;}
  .ptitle{fill:var(--text-primary);font-size:13px;font-weight:650;}
  .pdesc{fill:var(--text-secondary);font-size:11px;}
  .tick{fill:var(--muted);font-size:10.5px;font-variant-numeric:tabular-nums;}
  .leg{fill:var(--text-secondary);font-size:12px;}
  .stat{fill:var(--text-primary);font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;}
  .statd{fill:var(--text-secondary);font-size:11px;}
  .foot{fill:var(--muted);font-size:10.5px;}
  .earnline{fill:none;stroke:var(--earn);stroke-width:2;stroke-linejoin:round;}
</style>
</head>
<body>
<div class="wrap">
  <h1>One asylum seeker, 20 years: what the charge changes — and what the right to work changes</h1>
  <p class="sub">A representative asylum seeker <em>who finds work</em> (many never do). Gross earnings, the income tax + NI they pay, and repayment of the £10,000 charge. Same vertical scale across all three panels.</p>
  <div class="scroll">
  <svg viewBox="0 0 1000 486" role="img" aria-label="Three panels over 20 years. A, status quo: earnings rise to £31k, 20-year tax £59k, no charge. B, plus £10,000 charge: identical earnings and tax, but only £3,312 of the charge is repaid after 20 years. C, work rights at 3 months plus charge: earnings rise to £40k, 20-year tax £104k (£45k more than A), and the charge clears by year 17.">
    <!-- legend -->
    <line x1="330" y1="66" x2="352" y2="66" stroke="var(--earn)" stroke-width="2"/><text class="leg" x="358" y="70">Gross earnings</text>
    <rect x="470" y="60" width="12" height="12" rx="2" fill="var(--tax)"/><text class="leg" x="488" y="70">Income tax + NI paid</text>
    <rect x="628" y="60" width="12" height="12" rx="2" fill="var(--charge)"/><text class="leg" x="646" y="70">£10k charge repaid</text>

    <!-- ===== shared y gridlines + labels (drawn per panel; labels on A only) ===== -->
    <!-- Panel A -->
    <text class="ptitle" x="72" y="96">A · Status quo</text><text class="pdesc" x="72" y="110">12-month work ban, no charge</text>
    <g stroke="var(--grid)" stroke-width="1"><line x1="72" y1="380" x2="330" y2="380"/><line x1="72" y1="315.7" x2="330" y2="315.7"/><line x1="72" y1="251.4" x2="330" y2="251.4"/><line x1="72" y1="187.1" x2="330" y2="187.1"/><line x1="72" y1="122.9" x2="330" y2="122.9"/></g>
    <g class="tick" text-anchor="end"><text x="66" y="384">£0</text><text x="66" y="319">£10k</text><text x="66" y="255">£20k</text><text x="66" y="191">£30k</text><text x="66" y="127">£40k</text></g>
    <polygon fill="var(--tax)" fill-opacity="0.9" points="72.0,380.0 72.0,380.0 85.6,380.0 99.2,380.0 112.7,379.2 126.3,373.8 139.9,370.2 153.5,366.6 167.1,363.0 180.6,360.3 194.2,357.6 207.8,355.8 221.4,354.4 234.9,353.1 248.5,352.2 262.1,351.3 275.7,350.4 289.3,349.5 302.8,348.6 316.4,347.7 330.0,346.8 330.0,380.0"/>
    <polyline class="earnline" points="72.0,380.0 85.6,367.1 99.2,322.1 112.7,296.4 126.3,277.1 139.9,264.3 153.5,251.4 167.1,238.6 180.6,228.9 194.2,219.3 207.8,212.9 221.4,207.7 234.9,203.2 248.5,200.0 262.1,196.8 275.7,193.6 289.3,190.4 302.8,187.1 316.4,183.9 330.0,180.7"/>
    <g class="tick" text-anchor="middle"><text x="72" y="394">1</text><text x="126.3" y="394">5</text><text x="194.2" y="394">10</text><text x="262.1" y="394">15</text><text x="330" y="394">20</text></g>
    <text class="stat" x="72" y="416">20-yr tax paid: £59k</text>
    <text class="statd" x="72" y="432">No repayment charge.</text>

    <!-- Panel B -->
    <text class="ptitle" x="392" y="96">B · + £10,000 charge</text><text class="pdesc" x="392" y="110">Same ban, plus repayment</text>
    <g stroke="var(--grid)" stroke-width="1"><line x1="392" y1="380" x2="650" y2="380"/><line x1="392" y1="315.7" x2="650" y2="315.7"/><line x1="392" y1="251.4" x2="650" y2="251.4"/><line x1="392" y1="187.1" x2="650" y2="187.1"/><line x1="392" y1="122.9" x2="650" y2="122.9"/></g>
    <polygon fill="var(--tax)" fill-opacity="0.9" points="392.0,380.0 392.0,380.0 405.6,380.0 419.2,380.0 432.7,379.2 446.3,373.8 459.9,370.2 473.5,366.6 487.1,363.0 500.6,360.3 514.2,357.6 527.8,355.8 541.4,354.4 554.9,353.1 568.5,352.2 582.1,351.3 595.7,350.4 609.3,349.5 622.8,348.6 636.4,347.7 650.0,346.8 650.0,380.0"/>
    <polygon fill="var(--charge)" fill-opacity="0.92" points="392.0,380.0 405.6,380.0 419.2,380.0 432.7,379.2 446.3,373.8 459.9,370.2 473.5,366.6 487.1,363.0 500.6,360.3 514.2,357.6 527.8,355.2 541.4,353.3 554.9,351.7 568.5,350.5 582.1,349.3 595.7,348.1 609.3,346.9 622.8,345.7 636.4,344.5 650.0,343.4 650.0,346.8 636.4,347.7 622.8,348.6 609.3,349.5 595.7,350.4 582.1,351.3 568.5,352.2 554.9,353.1 541.4,354.4 527.8,355.8 514.2,357.6 500.6,360.3 487.1,363.0 473.5,366.6 459.9,370.2 446.3,373.8 432.7,379.2 419.2,380.0 405.6,380.0 392.0,380.0"/>
    <polyline class="earnline" points="392.0,380.0 405.6,367.1 419.2,322.1 432.7,296.4 446.3,277.1 459.9,264.3 473.5,251.4 487.1,238.6 500.6,228.9 514.2,219.3 527.8,212.9 541.4,207.7 554.9,203.2 568.5,200.0 582.1,196.8 595.7,193.6 609.3,190.4 622.8,187.1 636.4,183.9 650.0,180.7"/>
    <g class="tick" text-anchor="middle"><text x="392" y="394">1</text><text x="446.3" y="394">5</text><text x="514.2" y="394">10</text><text x="582.1" y="394">15</text><text x="650" y="394">20</text></g>
    <text class="stat" x="392" y="416">20-yr tax paid: £59k <tspan fill="var(--muted)">(same as A)</tspan></text>
    <text class="statd" x="392" y="432">Charge repaid: only £3.3k of £10k —</text>
    <text class="statd" x="392" y="446">£6.7k still owed after 20 years.</text>

    <!-- Panel C -->
    <text class="ptitle" x="712" y="96">C · Work rights at 3 months + charge</text><text class="pdesc" x="712" y="110">Earlier work, less scarring</text>
    <g stroke="var(--grid)" stroke-width="1"><line x1="712" y1="380" x2="970" y2="380"/><line x1="712" y1="315.7" x2="970" y2="315.7"/><line x1="712" y1="251.4" x2="970" y2="251.4"/><line x1="712" y1="187.1" x2="970" y2="187.1"/><line x1="712" y1="122.9" x2="970" y2="122.9"/></g>
    <polygon fill="var(--tax)" fill-opacity="0.9" points="712.0,380.0 712.0,380.0 725.6,377.4 739.2,370.2 752.7,363.0 766.3,357.6 779.9,354.0 793.5,350.4 807.1,346.8 820.6,344.1 834.2,341.4 847.8,339.6 861.4,338.2 874.9,336.9 888.5,336.0 902.1,335.1 915.7,334.2 929.3,333.3 942.8,332.4 956.4,331.5 970.0,330.6 970.0,380.0"/>
    <polygon fill="var(--charge)" fill-opacity="0.92" points="712.0,380.0 725.6,377.4 739.2,370.2 752.7,363.0 766.3,357.6 779.9,352.9 793.5,348.1 807.1,343.4 820.6,339.8 834.2,336.2 847.8,333.8 861.4,331.9 874.9,330.3 888.5,329.1 902.1,327.9 915.7,326.7 929.3,325.9 942.8,332.4 956.4,331.5 970.0,330.6 970.0,330.6 956.4,331.5 942.8,332.4 929.3,333.3 915.7,334.2 902.1,335.1 888.5,336.0 874.9,336.9 861.4,338.2 847.8,339.6 834.2,341.4 820.6,344.1 807.1,346.8 793.5,350.4 779.9,354.0 766.3,357.6 752.7,363.0 739.2,370.2 725.6,377.4 712.0,380.0"/>
    <polyline class="earnline" points="712.0,335.0 725.6,290.0 739.2,264.3 752.7,238.6 766.3,219.3 779.9,206.4 793.5,193.6 807.1,180.7 820.6,171.1 834.2,161.4 847.8,155.0 861.4,149.9 874.9,145.4 888.5,142.1 902.1,138.9 915.7,135.7 929.3,132.5 942.8,129.3 956.4,126.1 970.0,122.9"/>
    <g class="tick" text-anchor="middle"><text x="712" y="394">1</text><text x="766.3" y="394">5</text><text x="834.2" y="394">10</text><text x="902.1" y="394">15</text><text x="970" y="394">20</text></g>
    <text class="stat" x="712" y="416">20-yr tax paid: £104k <tspan fill="var(--tax)">(+£45k)</tspan></text>
    <text class="statd" x="712" y="432">Charge cleared in full by year 17 —</text>
    <text class="statd" x="712" y="446">and £45k more tax than the status quo.</text>

    <text class="foot" x="72" y="470">Illustrative, for one working asylum seeker. Earnings follow the RIO trajectory shape; tax = income tax + employee NI (28% above £12,570); repayment = 9% above £25,000, capped at £10,000. Panel C reflects a 3-month start and reduced scarring (Fasani; Hainmueller). Independently checked.</text>
  </svg>
  </div>
</div>
</body>
</html>
