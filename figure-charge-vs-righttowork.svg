<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 296" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Horizontal bar chart, present value per cohort. The £10,000 charge recovers about £82 million (range £48–109m). The right to work is worth far more, in three parts: accommodation saved about £170 million (£128–212m), tax paid immediately about £22 million (£17–28m), and tax paid later from avoided scarring about £102 million (£51–199m) — together roughly £294 million, about 3.6 times the charge." style="font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">
  <rect x="0" y="0" width="900" height="296" rx="8" fill="#ffffff"/>
  <text x="20" y="22" font-size="12.5" fill="#52514e">Fiscal value to the Exchequer per annual cohort, present value (£m). Bar = central; whisker = key-assumption range, not a full envelope.</text>

  <text x="235" y="64" text-anchor="end" font-size="13" font-weight="600" fill="#1A272A">The £10,000 charge</text>
  <text x="235" y="79" text-anchor="end" font-size="11" fill="#52514e">what it recovers</text>
  <rect x="250" y="55.0" width="155.8" height="22" rx="3" fill="#D15553"/>
  <line x1="341.2" y1="66" x2="457.1" y2="66" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="341.2" y1="61" x2="341.2" y2="71" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="457.1" y1="61" x2="457.1" y2="71" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <text x="469" y="65" font-size="15" font-weight="700" fill="#1A272A">£82m</text>
  <text x="469" y="79" font-size="11" fill="#52514e">£48–109m</text>

  <text x="20" y="117" font-size="11.5" font-weight="700" fill="#006970" letter-spacing="0.5">THE RIGHT TO WORK</text>
  <text x="235" y="147" text-anchor="end" font-size="13" font-weight="600" fill="#1A272A">Accommodation saved</text>
  <text x="235" y="162" text-anchor="end" font-size="11" fill="#52514e">support not paid while claims pending</text>
  <rect x="250" y="138.0" width="323.0" height="22" rx="3" fill="#006970"/>
  <line x1="493.2" y1="149" x2="652.8" y2="149" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="493.2" y1="144" x2="493.2" y2="154" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="652.8" y1="144" x2="652.8" y2="154" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <text x="665" y="148" font-size="15" font-weight="700" fill="#1A272A">£170m</text>
  <text x="665" y="162" font-size="11" fill="#52514e">£128–212m</text>
  <text x="235" y="189" text-anchor="end" font-size="13" font-weight="600" fill="#1A272A">Tax paid immediately</text>
  <text x="235" y="204" text-anchor="end" font-size="11" fill="#52514e">by those working sooner</text>
  <rect x="250" y="180.0" width="41.8" height="22" rx="3" fill="#B8860B"/>
  <line x1="282.3" y1="191" x2="303.2" y2="191" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="282.3" y1="186" x2="282.3" y2="196" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="303.2" y1="186" x2="303.2" y2="196" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <text x="315" y="190" font-size="15" font-weight="700" fill="#1A272A">£22m</text>
  <text x="315" y="204" font-size="11" fill="#52514e">£17–28m</text>
  <text x="235" y="231" text-anchor="end" font-size="13" font-weight="600" fill="#1A272A">Tax paid later</text>
  <text x="235" y="246" text-anchor="end" font-size="11" fill="#52514e">less scarring, higher employment</text>
  <rect x="250" y="222.0" width="193.8" height="22" rx="3" fill="#2D99B5"/>
  <line x1="346.9" y1="233" x2="628.1" y2="233" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="346.9" y1="228" x2="346.9" y2="238" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="628.1" y1="228" x2="628.1" y2="238" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <text x="640" y="232" font-size="15" font-weight="700" fill="#1A272A">£102m</text>
  <text x="640" y="246" font-size="11" fill="#52514e">£51–199m</text>

  <line x1="20" y1="263" x2="880" y2="263" stroke="#c3c2b7" stroke-width="1"/>
  <text x="20" y="282" font-size="13" fill="#1A272A"><tspan font-weight="700">Together, the right to work ≈ £294m</tspan> — about 3.6× the charge, and collected up front rather than over decades.</text>
</svg>
