<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Horizontal bar chart, present value per cohort. The £10,000 charge recovers about £82 million (range £48–109m). The right to work is worth far more: support saved while claims are pending about £192 million (£144–240m) and scarring avoided about £102 million (£51–199m) — together roughly £294 million, about 3.6 times the charge." style="font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">
  <rect x="0" y="0" width="820" height="300" rx="8" fill="#ffffff"/>
  <text x="20" y="30" font-size="17" font-weight="700" fill="#1A272A">The £10,000 charge recovers a fraction of what the right to work is worth</text>
  <text x="20" y="50" font-size="12.5" fill="#52514e">Fiscal value to the Exchequer per annual cohort, present value (£ millions). Bar = central estimate; whisker = plausible range.</text>

  <text x="235" y="93" text-anchor="end" font-size="13" font-weight="600" fill="#1A272A">The £10,000 charge</text>
  <text x="235" y="108" text-anchor="end" font-size="11" fill="#52514e">what it recovers</text>
  <rect x="250" y="84.0" width="155.8" height="22" rx="3" fill="#D15553"/>
  <line x1="341.2" y1="95" x2="457.1" y2="95" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="341.2" y1="90" x2="341.2" y2="100" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="457.1" y1="90" x2="457.1" y2="100" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <text x="469" y="94" font-size="15" font-weight="700" fill="#1A272A">£82m</text>
  <text x="469" y="108" font-size="11" fill="#52514e">£48–109m</text>

  <text x="20" y="146" font-size="11.5" font-weight="700" fill="#006970" letter-spacing="0.5">THE RIGHT TO WORK</text>
  <text x="235" y="176" text-anchor="end" font-size="13" font-weight="600" fill="#1A272A">Support saved</text>
  <text x="235" y="191" text-anchor="end" font-size="11" fill="#52514e">while claims are pending</text>
  <rect x="250" y="167.0" width="364.8" height="22" rx="3" fill="#006970"/>
  <line x1="523.6" y1="178" x2="706.0" y2="178" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="523.6" y1="173" x2="523.6" y2="183" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="706.0" y1="173" x2="706.0" y2="183" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <text x="718" y="177" font-size="15" font-weight="700" fill="#1A272A">£192m</text>
  <text x="718" y="191" font-size="11" fill="#52514e">£144–240m</text>
  <text x="235" y="218" text-anchor="end" font-size="13" font-weight="600" fill="#1A272A">Scarring avoided</text>
  <text x="235" y="233" text-anchor="end" font-size="11" fill="#52514e">higher long-run employment</text>
  <rect x="250" y="209.0" width="193.8" height="22" rx="3" fill="#2D99B5"/>
  <line x1="346.9" y1="220" x2="628.1" y2="220" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="346.9" y1="215" x2="346.9" y2="225" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <line x1="628.1" y1="215" x2="628.1" y2="225" stroke="#1A272A" stroke-width="1.5" opacity="0.65"/>
  <text x="640" y="219" font-size="15" font-weight="700" fill="#1A272A">£102m</text>
  <text x="640" y="233" font-size="11" fill="#52514e">£51–199m</text>

  <line x1="20" y1="250" x2="800" y2="250" stroke="#c3c2b7" stroke-width="1"/>
  <text x="20" y="270" font-size="13" fill="#1A272A"><tspan font-weight="700">Together, the right to work ≈ £294m</tspan> — about 3.6× the charge, and collected up front rather than over decades.</text>
  <text x="20" y="290" font-size="10" fill="#52514e">Sources: Home Office RIO; IPPR; NAO; Fasani et al. (2020); Hainmueller et al. (2016). Generated from model.py.</text>
</svg>
