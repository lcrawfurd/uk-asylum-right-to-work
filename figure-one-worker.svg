<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 486" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three 20-year panels for one working asylum seeker. A, status quo: earnings rise to £31k, 20-year tax £59k, no charge. B, plus £10,000 charge: identical earnings and tax, only £3,312 of the charge repaid after 20 years. C, work rights at 3 months plus charge: earnings rise to £40k, 20-year tax £104k (£45k more than A), charge cleared by year 17." style="max-width:100%;height:auto;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">
  <rect x="0" y="0" width="1000" height="486" rx="8" fill="#ffffff"/>
  <line x1="330" y1="66" x2="352" y2="66" stroke="#2a78d6" stroke-width="2"/><text x="358" y="70" fill="#52514e" font-size="12">Gross earnings</text>
  <rect x="470" y="60" width="12" height="12" rx="2" fill="#1baf7a"/><text x="488" y="70" fill="#52514e" font-size="12">Income tax + NI paid</text>
  <rect x="628" y="60" width="12" height="12" rx="2" fill="#e34948"/><text x="646" y="70" fill="#52514e" font-size="12">£10k charge repaid</text>
  <text x="72" y="96" fill="#0b0b0b" font-size="13" font-weight="650">A · Status quo</text><text x="72" y="110" fill="#52514e" font-size="11">12-month work ban, no charge</text>
  <g stroke="#e1e0d9" stroke-width="1"><line x1="72" y1="380" x2="330" y2="380"/><line x1="72" y1="315.7" x2="330" y2="315.7"/><line x1="72" y1="251.4" x2="330" y2="251.4"/><line x1="72" y1="187.1" x2="330" y2="187.1"/><line x1="72" y1="122.9" x2="330" y2="122.9"/></g>
