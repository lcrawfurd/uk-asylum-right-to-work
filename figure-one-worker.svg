<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 486" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three 40-year panels for one working asylum seeker at the 80th percentile of refugee earners. A, status quo: about £31k plateau, 40-year tax £177k, no charge. B, plus £10,000 charge: same earnings and tax; the £10,000 is repaid in full but only by year 28, worth about £5.4k in present value. C, work rights at 3 months plus charge: earnings reach about £38k, 40-year tax £254k (£77k more than A), charge cleared by year 16." style="max-width:100%;height:auto;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">
