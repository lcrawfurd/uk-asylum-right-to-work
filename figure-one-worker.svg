  <text x="712" y="416" fill="#0b0b0b" font-size="12" font-weight="600">20-yr tax paid: £104k (+£45k)</text>
  <text x="712" y="432" fill="#52514e" font-size="11">Charge cleared in full by year 17 —</text>
  <text x="712" y="446" fill="#52514e" font-size="11">and £45k more tax than the status quo.</text>
  <text x="72" y="470" fill="#898781" font-size="10.5">Illustrative, one working asylum seeker. Earnings follow the RIO trajectory shape; tax = income tax + employee NI (28% above £12,570); repayment = 9% above £25,000, capped at £10,000. Panel C reflects a 3-month start and reduced scarring. Independently checked.</text>
</svg>
