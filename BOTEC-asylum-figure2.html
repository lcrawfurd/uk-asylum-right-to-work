<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Earnings grow — but most never reach the threshold</title>
<style>
  :root {
    --surface:#fcfcfb; --text-primary:#0b0b0b; --text-secondary:#52514e; --muted:#898781;
    --grid:#e1e0d9; --baseline:#c3c2b7; --yr1:#86b6ef; --yr8:#1c5cab; --threshold:#d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root { --surface:#1a1a19; --text-primary:#fff; --text-secondary:#c3c2b7; --muted:#898781;
      --grid:#2c2c2a; --baseline:#383835; --yr1:#9ec5f4; --yr8:#3987e5; --threshold:#e66767; }
  }
  :root[data-theme="dark"]{ --surface:#1a1a19; --text-primary:#fff; --text-secondary:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --yr1:#9ec5f4; --yr8:#3987e5; --threshold:#e66767; }
  :root[data-theme="light"]{ --surface:#fcfcfb; --text-primary:#0b0b0b; --text-secondary:#52514e; --muted:#898781;
    --grid:#e1e0d9; --baseline:#c3c2b7; --yr1:#86b6ef; --yr8:#1c5cab; --threshold:#d03b3b; }
  html,body{margin:0;padding:0;background:var(--surface);}
  .wrap{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text-primary);max-width:820px;margin:0 auto;padding:24px 20px 32px;position:relative;}
  h1{font-size:20px;line-height:1.25;margin:0 0 6px;font-weight:650;}
  .sub{font-size:13.5px;color:var(--text-secondary);margin:0 0 4px;line-height:1.4;}
  svg{width:100%;height:auto;display:block;overflow:visible;}
  .bar{transition:opacity .12s;cursor:default;}
  .g:hover .bar{opacity:.82;}
  .dlab{fill:var(--text-primary);font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
  .glab{fill:var(--text-secondary);font-size:12px;}
  .rlab{fill:var(--threshold);font-size:12px;font-weight:650;}
  .tick{fill:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;}
  .axtitle{fill:var(--text-secondary);font-size:12px;}
  .leg{fill:var(--text-secondary);font-size:12px;}
  .foot{fill:var(--muted);font-size:10.5px;}
  .tip{position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,-100%);background:var(--text-primary);color:var(--surface);font-size:12px;line-height:1.35;padding:7px 9px;border-radius:6px;max-width:260px;box-shadow:0 2px 10px rgba(0,0,0,.25);transition:opacity .1s;z-index:5;}
  .tip b{font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Earnings grow after year one — but most still never reach the threshold</h1>
  <p class="sub">Share of all UK refugees by earnings band, year 1 vs year 8 after status. Even after eight years, ~87% earn below the £25,000 repayment threshold — so they repay nothing.</p>
  <div class="tip" id="tip"></div>
  <svg viewBox="0 0 760 390" role="img" aria-label="Grouped bars comparing UK refugee earnings year 1 versus year 8 as a share of all refugees: not in work falls 76% to 52%; in work below £25,000 rises 23% to 35%; at or above £25,000 rises from about 1% to about 13%.">
    <g stroke="var(--grid)" stroke-width="1">
      <line x1="70" y1="255" x2="720" y2="255"/><line x1="70" y1="200" x2="720" y2="200"/><line x1="70" y1="145" x2="720" y2="145"/><line x1="70" y1="90" x2="720" y2="90"/>
    </g>
    <g class="tick" text-anchor="end">
      <text x="60" y="314">0</text><text x="60" y="259">20</text><text x="60" y="204">40</text><text x="60" y="149">60</text><text x="60" y="94">80</text>
    </g>
    <text class="axtitle" x="34" y="81">%</text>
    <line x1="70" y1="310" x2="720" y2="310" stroke="var(--baseline)" stroke-width="1.5"/>
    <!-- legend -->
    <rect x="405" y="70" width="12" height="12" rx="2" fill="var(--yr1)"/><text class="leg" x="423" y="80">Year 1</text>
    <rect x="495" y="70" width="12" height="12" rx="2" fill="var(--yr8)"/><text class="leg" x="513" y="80">Year 8 after status</text>

    <!-- Group 1: not in work -->
    <g class="g" data-title="Not in work (£0)" data-body="76% of refugees are not in work in year 1, falling to 52% by year 8 as employment roughly doubles. None of them repay anything.">
      <path class="bar" d="M120,310 V104 A3,3 0 0 1 123,101 H163 A3,3 0 0 1 166,104 V310 Z" fill="var(--yr1)"/>
      <text class="dlab" x="143" y="93" text-anchor="middle">76%</text>
      <path class="bar" d="M172,310 V170 A3,3 0 0 1 175,167 H215 A3,3 0 0 1 218,170 V310 Z" fill="var(--yr8)"/>
      <text class="dlab" x="195" y="159" text-anchor="middle">52%</text>
      <text class="glab" x="169" y="330" text-anchor="middle">Not in work (£0)</text>
    </g>
    <!-- Group 2: in work below 25k -->
    <g class="g" data-title="In work, below £25,000" data-body="Employed but under the £25,000 threshold: 23% of all refugees in year 1, rising to 35% by year 8. They earn, but repay £0.">
      <path class="bar" d="M330,310 V249.8 A3,3 0 0 1 333,246.8 H373 A3,3 0 0 1 376,249.8 V310 Z" fill="var(--yr1)"/>
      <text class="dlab" x="353" y="238" text-anchor="middle">23%</text>
      <path class="bar" d="M382,310 V216.8 A3,3 0 0 1 385,213.8 H425 A3,3 0 0 1 428,216.8 V310 Z" fill="var(--yr8)"/>
      <text class="dlab" x="405" y="206" text-anchor="middle">35%</text>
      <text class="glab" x="379" y="330" text-anchor="middle">In work, below £25k</text>
    </g>
    <!-- Group 3: 25k+ repays -->
    <g class="g" data-title="£25,000+ — the only people who repay" data-body="Only ~1% of all refugees clear the £25,000 threshold in year 1, rising to ~13% by year 8. Everyone else repays nothing — which is why the charge recovers ~5% of face value.">
      <path class="bar" d="M540,307.3 H586 V310 H540 Z" fill="var(--yr1)"/>
      <text class="dlab" x="563" y="300" text-anchor="middle">~1%</text>
      <path class="bar" d="M592,310 V277.3 A3,3 0 0 1 595,274.3 H635 A3,3 0 0 1 638,277.3 V310 Z" fill="var(--yr8)"/>
      <text class="dlab" x="615" y="266" text-anchor="middle">13%</text>
      <text class="rlab" x="589" y="330" text-anchor="middle">£25k+ — repays</text>
    </g>

    <text class="foot" x="70" y="360">Share of ALL working-age refugees (RIO employment rates × RIO earnings distribution among the employed, 2015–2023).</text>
    <text class="foot" x="70" y="375">Threshold = student-loan Plan 5 (9% above £25,000). Even at year 8, ~87% earn below it. Figures independently checked.</text>
  </svg>
</div>
<script>
  (function(){
    var tip=document.getElementById('tip'), wrap=document.querySelector('.wrap');
    document.querySelectorAll('.g').forEach(function(row){
      row.addEventListener('mousemove',function(e){
        var r=wrap.getBoundingClientRect();
        tip.innerHTML='<b>'+row.dataset.title+'</b><br>'+row.dataset.body;
        tip.style.left=(e.clientX-r.left)+'px'; tip.style.top=(e.clientY-r.top-8)+'px'; tip.style.opacity=1;
      });
      row.addEventListener('mouseleave',function(){tip.style.opacity=0;});
    });
  })();
</script>
</body>
</html>
